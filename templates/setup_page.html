<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Installation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{url_for('static',filename='dist/output.css')}}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{{url_for('static',filename='dist/setup.js')}}"></script>
</head>
<body>
<div class="background p-6 h-screen">
    <h2 class="text-2xl font-bold text-white">Einstellungen</h2>
    <span class="text-gray-400">Test API connection, generate and print PDF</span>

    <div class="mt-6 grid grid-cols-1 gap-4 sm:grid-cols-3">
        <!-- API Test -->
        <div class="relative flex flex-col gap-x-4 rounded-xl p-6 w-full outline outline-white/10">
            <div class="absolute z-0 inset-0 blur-sm grayscale rounded-xl" style="background-color: rgba(255, 255, 255, .1);"></div>
            <div class="relative z-10 inset-0">
                <div >
                    <div class="text-xl font-medium text-white">PDF Einstellungen</div>
                    <p class="text-gray-400">Daten des Alarmausdrucks konfigurieren</p>
                </div>
                <div class="mt-8 grid grid-cols-1 gap-4 sm:grid-cols-3">
                    <div>
                        <div class="text-md font-medium text-white">Kopien - Einsatzinfo</div>
                        <div class="flex shadow-xs rounded-base mt-2">
                            <span class="inline-flex items-center px-3 text-sm text-gray-800 bg-gray-400 border border-gray-300 border-r-0 rounded-l-lg">Anzahl</span>
                            <input type="number" min="1" max="4" id="cnt_operation_info" value="{{ data.operation_info_copies }}" class="block w-full rounded-r-lg border border-gray-100 bg-gray-200 px-3 py-2 text-sm text-black placeholder-gray-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="1-4">
                        </div>
                    </div>
                    <div>
                        <div class="text-md font-medium text-white">Kopien - Karte (Hydrant)</div>
                        <div class="flex shadow-xs rounded-base mt-2">
                            <span class="inline-flex items-center px-3 text-sm text-gray-800 bg-gray-400 border border-gray-300 border-r-0 rounded-l-lg">Anzahl</span>
                            <input type="number" min="0" max="4" id="cnt_hydrant_map" value="{{ data.hydrant_map_copies }}" class="block w-full rounded-r-lg border border-gray-100 bg-gray-200 px-3 py-2 text-sm text-black placeholder-gray-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="0-4">
                        </div>
                    </div>
                </div>
                <div class="mt-6 flex items-center">
                    <span id="save_result" class="ml-auto text-sm text-gray-400"></span>
                    <button id="save_pdf_settings_button" style="background-color: #7902DB;" class="inline-flex items-center ml-4 px-4 py-2 text-sm font-medium text-white rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">Einstellungen speichern</button>
                </div>
            </div>           
        </div>
    </div>
</div>
</body>
</html>
